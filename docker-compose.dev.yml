version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: ej-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: electronic_journal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./server/src/config/migration.sql:/docker-entrypoint-initdb.d/01-migration.sql
      - ./server/src/config/seeds.sql:/docker-entrypoint-initdb.d/02-seeds.sql
    ports:
      - "5433:5432"
    networks:
      - ej-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d electronic_journal"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ej-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tusur.ru
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - ej-network-dev

volumes:
  postgres_data_dev:

networks:
  ej-network-dev:
    driver: bridge
